<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustLens</title>
  <style>
    :root {
      --bg: #0f2131;
      --panel: #f7fafc;
      --line: #d8e2eb;
      --text: #142a3a;
      --muted: #5d6e7d;
      --accent: #0e608f;
      --accent-strong: #084a70;
      --success: #1e774d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 360px;
      min-height: 460px;
      padding: 14px;
      font-family: "DM Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #163246, var(--bg));
      color: #eaf3f9;
    }

    .shell {
      background: var(--panel);
      border-radius: 14px;
      color: var(--text);
      border: 1px solid #bdd0de;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(120deg, #0f3248 0%, #18567a 100%);
      color: #fff;
      padding: 14px;
    }

    .header strong {
      display: block;
      font-size: 18px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .action-grid {
      display: grid;
      gap: 8px;
    }

    .setting-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f7fbff;
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .setting-title {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      color: #254a63;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .mode-toggle {
      display: inline-flex;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 3px;
      background: #eef5fb;
    }

    .mode-toggle label {
      flex: 1;
    }

    .mode-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .mode-option {
      display: block;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #35566f;
      border-radius: 7px;
      padding: 7px 8px;
      cursor: pointer;
    }

    .mode-toggle input:checked+.mode-option {
      background: #fff;
      color: #124666;
      box-shadow: 0 1px 4px rgba(9, 35, 55, 0.12);
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 9px;
      border: 1px solid transparent;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.alt {
      background: #f5f8fb;
      color: #214963;
      border-color: var(--line);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    #result {
      max-height: 188px;
      overflow: auto;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      margin-top: 8px;
      background: #fff;
    }

    .history-item strong {
      display: block;
    }

    .history-item-link {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    .history-item-link:hover {
      border-color: #9bbcd4;
      background: #f7fbff;
    }

    a {
      color: #0e5d8b;
      text-decoration: none;
      font-weight: 600;
    }

    .status-chip {
      border-radius: 999px;
      font-size: 11px;
      background: #eff6fc;
      color: #1f5678;
      display: inline-block;
      padding: 3px 8px;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="header">
      <strong>TrustLens</strong>
      <p>Credibility signals for online content.</p>
    </div>

    <div class="content">
      <div class="action-grid">
        <div class="setting-box">
          <p class="setting-title">TL;DR Mode</p>
          <div class="mode-toggle" aria-label="TLDR mode">
            <label>
              <input type="radio" name="tldrMode" value="local-neural" />
              <span class="mode-option">Local Model</span>
            </label>
            <label>
              <input type="radio" name="tldrMode" value="openai" />
              <span class="mode-option">ChatGPT</span>
            </label>
          </div>
        </div>
        <button id="openDashboard" class="alt">Open Dashboard</button>
      </div>

      <div class="muted">
        Select text on the page to open the on-page action menu.
      </div>

      <div id="result">Loading site history...</div>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>

</html>
